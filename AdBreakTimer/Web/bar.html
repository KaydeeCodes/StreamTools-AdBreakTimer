<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ad Break Bar</title>
<!--
  Ad Break Timer — bottom progress bar overlay
  Made by Kaydee.Codes (https://kaydee.codes/) - Free to use, no data collected, ever.
-->
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
  }
  /* Pinned to the bottom of whatever size the browser source is —
     no fixed canvas dimensions, it just fills whatever it's given. */
  #track {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    width: 100%;
  }
  #fill {
    position: absolute;
    left: 0; bottom: 0; top: 0;
    width: 0%;
    transition: width 0.25s linear, background-color 0.3s ease;
  }
  #fill.pulse {
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
</style>
</head>
<body>
  <div id="track">
    <div id="fill"></div>
  </div>

<script>
  const API = "/bar/api";

  function render(state) {
    const track = document.getElementById('track');
    const fill = document.getElementById('fill');

    track.style.height = state.barHeight + 'px';

    document.body.style.background = state.bgColor === 'transparent' ? 'transparent' : state.bgColor;

    // percent of time that has passed
    const initial = state.initialTime > 0 ? state.initialTime : 1;
    const elapsedPct = Math.min(100, Math.max(0, ((initial - state.remaining) / initial) * 100));

    let pct;
    if (state.status === 'finished') {
      // Snap to full width so the finish-colour flash is actually visible,
      // regardless of which direction the bar was draining/filling in.
      pct = 100;
    } else if (state.status === 'idle') {
      pct = 0;
    } else {
      // "drain": bar starts full, shrinks as time passes
      // "fill":  bar starts empty, grows as time passes
      pct = state.direction === 'fill' ? elapsedPct : (100 - elapsedPct);
    }

    fill.style.width = pct + '%';

    const color = state.status === 'finished' ? state.finishColor : state.color;
    fill.style.backgroundColor = color;

    if (state.status === 'finished' && state.flashOnFinish) {
      fill.classList.add('pulse');
    } else {
      fill.classList.remove('pulse');
    }
  }

  async function poll() {
    try {
      const res = await fetch(API + '?cmd=status', { cache: 'no-store' });
      const data = await res.json();
      if (data.ok) render(data.state);
    } catch (e) {
      // server not reachable yet — ignore and retry
    }
    setTimeout(poll, 200);
  }

  poll();
</script>
</body>
</html>
