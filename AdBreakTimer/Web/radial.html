<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ad Break Radial</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #ring {
    transition: stroke-dashoffset 0.25s linear, stroke 0.3s ease;
  }
  #ring.pulse {
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
</style>
</head>
<body>
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <circle id="track" fill="none" />
    <circle id="ring" fill="none" stroke-linecap="butt" transform-origin="center" />
  </svg>

<script>
  const API = "/radial/api";

  function render(state) {
    const svg = document.getElementById('svg');
    const track = document.getElementById('track');
    const ring = document.getElementById('ring');

    const size = state.size;
    const thickness = state.thickness;
    const r = (size / 2) - (thickness / 2);
    const cx = size / 2, cy = size / 2;
    const circumference = 2 * Math.PI * r;

    svg.setAttribute('width', state.canvasWidth);
    svg.setAttribute('height', state.canvasHeight);
    svg.setAttribute('viewBox', `0 0 ${state.canvasWidth} ${state.canvasHeight}`);

    document.body.style.background = state.bgColor === 'transparent' ? 'transparent' : state.bgColor;

    const ox = state.canvasWidth / 2;
    const oy = state.canvasHeight / 2;
    for (const c of [track, ring]) {
      c.setAttribute('cx', ox);
      c.setAttribute('cy', oy);
      c.setAttribute('r', r);
      c.setAttribute('stroke-width', thickness);
    }

    track.setAttribute('stroke', state.trackColor || 'rgba(255,255,255,0.15)');

    ring.setAttribute('stroke-dasharray', circumference);

    const initial = state.initialTime > 0 ? state.initialTime : 1;
    const elapsedPct = Math.min(1, Math.max(0, (initial - state.remaining) / initial));

    // ring drains from full circle to none as time elapses
    const drawnFraction = 1 - elapsedPct;
    ring.setAttribute('stroke-dashoffset', circumference * (1 - drawnFraction));

    // rotate so it starts at 12 o'clock, and mirror for anticlockwise
    const mirror = state.direction === 'ccw' ? 'scale(-1,1)' : '';
    ring.setAttribute('transform', `translate(${ox},${oy}) rotate(-90) ${mirror} translate(${-ox},${-oy})`);

    const color = state.status === 'finished' ? state.finishColor : state.color;
    ring.setAttribute('stroke', color);

    if (state.status === 'finished' && state.flashOnFinish) {
      ring.classList.add('pulse');
    } else {
      ring.classList.remove('pulse');
    }
  }

  async function poll() {
    try {
      const res = await fetch(API + '?cmd=status', { cache: 'no-store' });
      const data = await res.json();
      if (data.ok) render(data.state);
    } catch (e) {
      // server not reachable yet — ignore and retry
    }
    setTimeout(poll, 200);
  }

  poll();
</script>
</body>
</html>
