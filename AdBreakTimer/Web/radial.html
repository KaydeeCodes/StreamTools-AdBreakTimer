<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ad Break Radial</title>
<!--
  Ad Break Timer — radial progress ring overlay
  Made by Kaydee.Codes (https://kaydee.codes/) - Free to use, no data collected, ever.
-->
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #ring {
    transition: stroke-dashoffset 0.25s linear, stroke 0.3s ease;
  }
  #ring.pulse {
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
</style>
</head>
<body>
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">
    <circle id="track" fill="none" />
    <circle id="ring" fill="none" stroke-linecap="butt" />
  </svg>

<script>
  const API = "/radial/api";
  let lastState = null;

  // Diameter = a percentage of whichever viewport dimension is smaller,
  // recalculated on every render — this is what makes the ring actually
  // grow and shrink as the OBS Browser Source is resized, instead of
  // staying a fixed pixel size.
  function computeDiameter(sizePercent) {
    const vmin = Math.min(window.innerWidth, window.innerHeight);
    return Math.max(20, vmin * (sizePercent / 100));
  }

  function render(state) {
    lastState = state;

    const svg = document.getElementById('svg');
    const track = document.getElementById('track');
    const ring = document.getElementById('ring');

    const diameter = computeDiameter(state.size);
    const thickness = Math.max(1, diameter * (state.thickness / 100));
    const r = (diameter / 2) - (thickness / 2);
    const circumference = 2 * Math.PI * r;
    const cx = diameter / 2, cy = diameter / 2;

    svg.setAttribute('width', diameter);
    svg.setAttribute('height', diameter);
    svg.setAttribute('viewBox', `0 0 ${diameter} ${diameter}`);

    document.body.style.background = state.bgColor === 'transparent' ? 'transparent' : state.bgColor;

    for (const c of [track, ring]) {
      c.setAttribute('cx', cx);
      c.setAttribute('cy', cy);
      c.setAttribute('r', r);
      c.setAttribute('stroke-width', thickness);
    }

    track.setAttribute('stroke', state.trackColor || 'rgba(255,255,255,0.15)');

    ring.setAttribute('stroke-dasharray', circumference);

    const initial = state.initialTime > 0 ? state.initialTime : 1;
    const elapsedPct = Math.min(1, Math.max(0, (initial - state.remaining) / initial));

    let drawnFraction;
    if (state.status === 'finished') {
      // Fully drawn so the finish-colour flash is actually visible.
      drawnFraction = 1;
    } else if (state.status === 'idle') {
      drawnFraction = 0;
    } else {
      // ring drains from full circle to none as time elapses
      drawnFraction = 1 - elapsedPct;
    }
    ring.setAttribute('stroke-dashoffset', circumference * (1 - drawnFraction));

    // rotate so it starts at 12 o'clock, and mirror for anticlockwise
    const mirror = state.direction === 'ccw' ? 'scale(-1,1)' : '';
    ring.setAttribute('transform', `translate(${cx},${cy}) rotate(-90) ${mirror} translate(${-cx},${-cy})`);

    const color = state.status === 'finished' ? state.finishColor : state.color;
    ring.setAttribute('stroke', color);

    if (state.status === 'finished' && state.flashOnFinish) {
      ring.classList.add('pulse');
    } else {
      ring.classList.remove('pulse');
    }
  }

  // Re-render immediately on resize (rather than waiting for the next
  // poll) so it feels responsive while dragging the source around.
  window.addEventListener('resize', () => {
    if (lastState) render(lastState);
  });

  async function poll() {
    try {
      const res = await fetch(API + '?cmd=status', { cache: 'no-store' });
      const data = await res.json();
      if (data.ok) render(data.state);
    } catch (e) {
      // server not reachable yet — ignore and retry
    }
    setTimeout(poll, 200);
  }

  poll();
</script>
</body>
</html>
